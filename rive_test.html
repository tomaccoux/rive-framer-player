<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rive File Test</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui; background: #0f0f16; color: #fff; height: 100vh; overflow: hidden; }
  h1 { font-size: 16px; margin: 0 0 16px 0; font-weight: 600; color: #fff; }
  .layout { display: grid; grid-template-columns: 360px 1fr; height: 100vh; }
  .sidebar { padding: 20px; border-right: 1px solid #222; overflow-y: auto; background: #14141c; }
  .main { padding: 20px; display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  select, input { width: 100%; background: #1f1f2e; color: #fff; border: 1px solid #333; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; }
  input[type="text"] { font-family: monospace; font-size: 11px; }
  input[type="file"] { padding: 6px; font-family: inherit; font-size: 12px; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  button { cursor: pointer; background: #4a3aff; color: #fff; border: none; padding: 10px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; }
  button.secondary { background: #2a2a38; }
  button:hover { opacity: 0.9; }
  button.full { grid-column: 1 / -1; }
  #stage { flex: 1; background: #1a1a24; border-radius: 12px; min-height: 300px; overflow: hidden; position: relative; }
  canvas { width: 100%; height: 100%; display: block; }
  .log { height: 240px; background: #14141c; border: 1px solid #222; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6; }
  .log .ok { color: #4ade80; }
  .log .err { color: #ef4444; }
  .log .info { color: #60a5fa; }
  .log .meta { color: #888; }
  .hint { font-size: 11px; color: #888; margin-top: 4px; }
  .divider { height: 1px; background: #222; margin: 18px 0; }
  .section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; font-weight: 600; }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <h1>Rive File Test</h1>

    <div class="section-title">Source</div>
    <div class="field">
      <label>Type</label>
      <select id="source" onchange="onSourceChange()">
        <option value="url">URL / file in repo</option>
        <option value="local">Local file (upload)</option>
      </select>
    </div>

    <div id="urlRow">
      <div class="field">
        <label>Preset</label>
        <select id="preset" onchange="onPresetChange()">
          <option value="">-- pick a file --</option>
          <option value="Hero_Wbis_landing_page.riv">Hero_Wbis_landing_page.riv</option>
          <option value="Scripting Hero.riv">Scripting Hero.riv</option>
          <option value="coming_soon.riv">coming_soon.riv</option>
          <option value="DayNight.riv">DayNight.riv</option>
          <option value="Landing_lightning_scripts.riv">Landing_lightning_scripts.riv</option>
          <option value="landing_page.riv">landing_page.riv</option>
          <option value="lightning_scripts.riv">lightning_scripts.riv</option>
          <option value="lightning_test.riv">lightning_test.riv</option>
          <option value="path_effect_script.riv">path_effect_script.riv</option>
          <option value="product_ready.riv">product_ready.riv</option>
          <option value="responsive_design.riv">responsive_design.riv</option>
          <option value="responsive_designnew.riv">responsive_designnew.riv</option>
          <option value="ResponsiveIpad.riv">ResponsiveIpad.riv</option>
          <option value="Responsive.riv">Responsive.riv</option>
          <option value="Rigging.riv">Rigging.riv</option>
          <option value="RivSteps.riv">RivSteps.riv</option>
          <option value="snow_effect.riv">snow_effect.riv</option>
          <option value="beach_ball.riv">beach_ball.riv</option>
          <option value="converter_scripts.riv">converter_scripts.riv</option>
        </select>
      </div>
      <div class="field">
        <label>URL</label>
        <input type="text" id="url" value="https://raw.githubusercontent.com/tomaccoux/rive-framer-player/main/Hero_Wbis_landing_page.riv">
      </div>
    </div>

    <div id="localRow" style="display: none;">
      <div class="field">
        <label>Upload .riv</label>
        <input type="file" id="localFile" accept=".riv" onchange="onLocalFileChange()">
        <div class="hint" id="localFileInfo"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">Playback</div>
    <div class="field">
      <label>Artboard</label>
      <select id="artboardSelect" onchange="onArtboardSelect()">
        <option value="">(default — first artboard)</option>
        <option value="__custom__">Custom name…</option>
      </select>
      <input type="text" id="artboard" value="SpaceSquare" placeholder="Type artboard name" style="margin-top: 6px; display: none;">
      <div class="hint" id="artboardHint">Load a file to populate the list</div>
    </div>
    <div class="field">
      <label>State Machine</label>
      <select id="stateMachineSelect" onchange="onStateMachineSelect()">
        <option value="">(default)</option>
        <option value="__custom__">Custom name…</option>
      </select>
      <input type="text" id="stateMachine" value="State Machine 1" placeholder="Type state machine name" style="margin-top: 6px; display: none;">
    </div>

    <div class="buttons">
      <button class="full" onclick="loadRive(false)">Reload</button>
      <button class="secondary" onclick="loadRive(true)">Bypass cache</button>
      <button class="secondary" onclick="useFirstArtboard()">First artboard</button>
      <button class="secondary full" onclick="clearLog()">Clear log</button>
    </div>
  </aside>

  <main class="main">
    <div id="stage"><canvas id="canvas"></canvas></div>
    <div class="log" id="log"></div>
  </main>

</div>

<script src="https://unpkg.com/@rive-app/webgl2@latest/rive.js"></script>
<script>
const logEl = document.getElementById('log');
function log(msg, cls='') {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = new Date().toISOString().slice(11,19) + ' ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

function populateSelect(id, values, includeDefault = true) {
  const sel = document.getElementById(id);
  const currentValue = sel.value;
  sel.innerHTML = '';
  if (includeDefault) {
    const defOpt = document.createElement('option');
    defOpt.value = '';
    defOpt.textContent = '(default — first available)';
    sel.appendChild(defOpt);
  }
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = formatArtboardLabel(v);
    sel.appendChild(opt);
  });
  const customOpt = document.createElement('option');
  customOpt.value = '__custom__';
  customOpt.textContent = 'Custom name…';
  sel.appendChild(customOpt);

  if (values.includes(currentValue)) sel.value = currentValue;
  else if (currentValue === '__custom__') sel.value = '__custom__';
  else sel.value = '';
}

function formatArtboardLabel(name) {
  const meta = artboardMetadata[name];
  if (!meta) return name;
  const parts = [name];
  if (meta.smCount === 0) parts.push('· LEAF (likely component)');
  else parts.push('· TOP (' + meta.smCount + ' SM)');
  return parts.join(' ');
}

async function discoverArtboards(buffer, artboardNames) {
  log('Discovering component info for ' + artboardNames.length + ' artboards...', 'meta');
  const hiddenCanvas = document.createElement('canvas');
  hiddenCanvas.width = 100; hiddenCanvas.height = 100;
  hiddenCanvas.style.display = 'none';
  document.body.appendChild(hiddenCanvas);

  for (const name of artboardNames) {
    try {
      await new Promise((resolve) => {
        const r = new rive.Rive({
          buffer: buffer.slice(0),
          canvas: hiddenCanvas,
          artboard: name,
          autoplay: false,
          onLoad: () => {
            const sms = r.stateMachineNames || [];
            artboardMetadata[name] = { smCount: sms.length, stateMachines: sms };
            try { r.cleanup(); } catch (e) {}
            resolve();
          },
          onLoadError: () => {
            artboardMetadata[name] = { smCount: 0, stateMachines: [], error: true };
            resolve();
          }
        });
        setTimeout(() => resolve(), 2000);
      });
    } catch (e) {}
  }
  document.body.removeChild(hiddenCanvas);

  const tops = artboardNames.filter(n => artboardMetadata[n]?.smCount > 0);
  const leafs = artboardNames.filter(n => artboardMetadata[n]?.smCount === 0);
  log('Discovery done · TOP: ' + tops.join(', ') + ' · LEAF: ' + leafs.join(', '), 'ok');

  populateSelect('artboardSelect', artboardNames);
}

function onArtboardSelect() {
  const sel = document.getElementById('artboardSelect');
  const input = document.getElementById('artboard');
  if (sel.value === '__custom__') {
    input.style.display = '';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = sel.value;
    if (sel.value !== '') loadRive(false);
  }
}

function onStateMachineSelect() {
  const sel = document.getElementById('stateMachineSelect');
  const input = document.getElementById('stateMachine');
  if (sel.value === '__custom__') {
    input.style.display = '';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = sel.value;
    if (sel.value !== '') loadRive(false);
  }
}

function getSelectedArtboard() {
  const sel = document.getElementById('artboardSelect');
  if (sel.value === '__custom__') return document.getElementById('artboard').value.trim();
  return sel.value;
}

function getSelectedStateMachine() {
  const sel = document.getElementById('stateMachineSelect');
  if (sel.value === '__custom__') return document.getElementById('stateMachine').value.trim();
  return sel.value;
}

let riveInstance = null;
let localFileBuffer = null;
let lastLoadedAvailableArtboards = [];
let lastFileBuffer = null;
let artboardMetadata = {};

const REPO_BASE = 'https://raw.githubusercontent.com/tomaccoux/rive-framer-player/main';

function onSourceChange() {
  const source = document.getElementById('source').value;
  document.getElementById('urlRow').style.display = source === 'url' ? '' : 'none';
  document.getElementById('localRow').style.display = source === 'local' ? '' : 'none';
}

function onPresetChange() {
  const preset = document.getElementById('preset').value;
  if (preset) {
    document.getElementById('url').value = REPO_BASE + '/' + encodeURIComponent(preset).replace(/%20/g, '%20');
  }
}

function onLocalFileChange() {
  const fileInput = document.getElementById('localFile');
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    localFileBuffer = e.target.result;
    document.getElementById('localFileInfo').textContent = file.name + ' · ' + file.size + ' bytes';
    log('Local file loaded: ' + file.name + ' · ' + file.size + ' bytes', 'ok');
  };
  reader.onerror = (e) => log('File read failed: ' + e.message, 'err');
  reader.readAsArrayBuffer(file);
}

function useFirstArtboard() {
  if (lastLoadedAvailableArtboards.length === 0) {
    log('No artboards discovered yet. Load a file first.', 'err');
    return;
  }
  document.getElementById('artboard').value = lastLoadedAvailableArtboards[0];
  log('Set artboard to: ' + lastLoadedAvailableArtboards[0], 'info');
  loadRive(false);
}

async function getBuffer(bustCache) {
  const source = document.getElementById('source').value;

  if (source === 'local') {
    if (!localFileBuffer) { throw new Error('No local file selected'); }
    return { buffer: localFileBuffer, url: '(local file)' };
  }

  let url = document.getElementById('url').value.trim();
  if (!url) throw new Error('URL is empty');
  if (bustCache) url += (url.includes('?') ? '&' : '?') + 'v=' + Date.now();

  log('Fetching ' + url, 'info');
  const t0 = performance.now();
  const res = await fetch(url, bustCache ? { cache: 'no-store' } : {});
  if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
  const len = res.headers.get('content-length');
  const etag = res.headers.get('etag');
  log('HTTP ' + res.status + (len ? ' · ' + len + ' bytes' : '') + (etag ? ' · etag ' + etag.slice(0, 20) + '...' : ''), 'ok');
  const buffer = await res.arrayBuffer();
  log('Downloaded ' + buffer.byteLength + ' bytes in ' + Math.round(performance.now()-t0) + 'ms', 'ok');
  return { buffer, url };
}

async function loadRive(bustCache=false) {
  if (riveInstance) { try { riveInstance.cleanup(); } catch(e){} riveInstance = null; }

  let buffer;
  try {
    const result = await getBuffer(bustCache);
    buffer = result.buffer;
    if (lastFileBuffer !== buffer) {
      artboardMetadata = {};
    }
    lastFileBuffer = buffer;
  } catch (e) {
    log(e.message, 'err');
    return;
  }

  const artboard = getSelectedArtboard();
  const stateMachine = getSelectedStateMachine();

  log('Initializing Rive · artboard="' + (artboard || '(default)') + '" · stateMachine="' + (stateMachine || '(default)') + '"', 'info');
  const canvas = document.getElementById('canvas');
  try {
    riveInstance = new rive.Rive({
      buffer: buffer,
      canvas: canvas,
      artboard: artboard || undefined,
      stateMachines: stateMachine || undefined,
      autoplay: true,
      layout: new rive.Layout({ fit: rive.Fit.Contain, alignment: rive.Alignment.Center }),
      onLoad: () => {
        log('onLoad fired', 'ok');
        riveInstance.resizeDrawingSurfaceToCanvas();
        const abs = riveInstance.artboardNames;
        if (abs && abs.length) {
          lastLoadedAvailableArtboards = abs;
          log('Available artboards: ' + abs.join(' · '), 'info');
          populateSelect('artboardSelect', abs);
          document.getElementById('artboardHint').textContent = abs.length + ' available · discovering components...';
          // Kick off component discovery pass
          if (lastFileBuffer) {
            const needsDiscovery = abs.some(n => !artboardMetadata[n]);
            if (needsDiscovery) {
              discoverArtboards(lastFileBuffer, abs).then(() => {
                const tops = abs.filter(n => artboardMetadata[n]?.smCount > 0).length;
                const leafs = abs.filter(n => artboardMetadata[n]?.smCount === 0).length;
                document.getElementById('artboardHint').textContent = tops + ' TOP · ' + leafs + ' LEAF (likely components)';
              });
            }
          }
        }
        const sms = riveInstance.stateMachineNames;
        if (sms && sms.length) {
          log('Available state machines: ' + sms.join(' · '), 'info');
          populateSelect('stateMachineSelect', sms);
        }
      },
      onLoadError: (e) => {
        const msg = e?.message || (typeof e === 'string' ? e : JSON.stringify(e));
        log('onLoadError: ' + msg, 'err');
      },
      onStateChange: (e) => {
        log('State change: ' + JSON.stringify(e.data), 'meta');
      }
    });

    window.addEventListener('resize', () => {
      if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
    });
  } catch (e) {
    log('Init crashed: ' + e.message, 'err');
  }
}

window.addEventListener('load', () => {
  // Initial state: show the custom inputs with pre-filled values
  document.getElementById('artboardSelect').value = '__custom__';
  document.getElementById('artboard').style.display = '';
  document.getElementById('stateMachineSelect').value = '__custom__';
  document.getElementById('stateMachine').style.display = '';
  loadRive(true);
});
</script>
</body>
</html>
