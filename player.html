<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboard = params.get('artboard');
        const stateMachine = params.get('stateMachine') || params.get('sm') || 'State Machine 1';
        const fit = params.get('fit') || 'contain';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        if (!src) {
            showError('No src parameter provided');
        } else if (typeof rive === 'undefined') {
            showError('Failed to load Rive runtime');
        } else {
            const fitMap = {
                'contain': rive.Fit.Contain,
                'cover': rive.Fit.Cover,
                'fill': rive.Fit.Fill,
                'fitWidth': rive.Fit.FitWidth,
                'fitHeight': rive.Fit.FitHeight,
                'none': rive.Fit.None,
                'scaleDown': rive.Fit.ScaleDown
            };

            console.log('🎬 Loading Rive with state machine:', stateMachine);

            const r = new rive.Rive({
                src: src,
                canvas: canvas,
                artboard: artboard || undefined,
                stateMachines: stateMachine,
                autoplay: true,
                fit: fitMap[fit] || rive.Fit.Contain,
                onLoad: function() {
                    console.log('✅ Rive loaded');
                    console.log('📦 State machines:', r.stateMachineNames);
                    console.log('🎨 Artboards:', r.artboardNames);
                    r.resizeDrawingSurfaceToCanvas();
                    
                    // Ensure state machine is playing
                    r.play(stateMachine);
                },
                onLoadError: function(e) {
                    showError('Failed to load: ' + src);
                    console.error('❌ Load error:', e);
                },
                onStateChange: function(event) {
                    console.log('🔄 State change:', event);
                }
            });

            // Pointer events
            function getCoords(event) {
                const rect = canvas.getBoundingClientRect();
                return { x: event.clientX - rect.left, y: event.clientY - rect.top };
            }

            canvas.addEventListener('mousedown', (e) => {
                const c = getCoords(e);
                console.log('👆 Click at:', c.x, c.y);
                r.pointerDown(c.x, c.y);
            });

            canvas.addEventListener('mouseup', (e) => {
                const c = getCoords(e);
                r.pointerUp(c.x, c.y);
            });

            canvas.addEventListener('mousemove', (e) => {
                const c = getCoords(e);
                r.pointerMove(c.x, c.y);
            });

            // Touch
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const c = getCoords(e.touches[0]);
                console.log('👆 Touch at:', c.x, c.y);
                r.pointerDown(c.x, c.y);
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const c = getCoords(e.changedTouches[0]);
                r.pointerUp(c.x, c.y);
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const c = getCoords(e.touches[0]);
                r.pointerMove(c.x, c.y);
            }, { passive: false });

            // Resize
            window.addEventListener('resize', () => r.resizeDrawingSurfaceToCanvas());

            // Debug
            window.r = r;
        }
    </script>
</body>
</html>
