<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Rive Player v3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <script>
        console.log('🚀 Rive Player v3');
        
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboard = params.get('artboard');
        const stateMachine = params.get('stateMachine') || params.get('sm') || 'State Machine 1';
        const fit = params.get('fit') || 'contain';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        if (!src) {
            showError('No src parameter provided');
        } else if (typeof rive === 'undefined') {
            showError('Failed to load Rive runtime');
        } else {
            const fitMap = {
                'contain': rive.Fit.Contain,
                'cover': rive.Fit.Cover,
                'fill': rive.Fit.Fill,
                'fitWidth': rive.Fit.FitWidth,
                'fitHeight': rive.Fit.FitHeight,
                'none': rive.Fit.None,
                'scaleDown': rive.Fit.ScaleDown
            };

            console.log('🎬 Loading with state machine:', stateMachine);

            const r = new rive.Rive({
                src: src,
                canvas: canvas,
                artboard: artboard || undefined,
                stateMachines: stateMachine,
                autoplay: true,
                fit: fitMap[fit] || rive.Fit.Contain,
                // Let Rive handle pointer events automatically
                automaticallyHandleEvents: true,
                onLoad: function() {
                    console.log('✅ Loaded successfully');
                    console.log('📦 State machines:', r.stateMachineNames);
                    r.resizeDrawingSurfaceToCanvas();
                },
                onLoadError: function(e) {
                    showError('Failed to load file');
                    console.error('❌ Error:', e);
                },
                onStateChange: function(event) {
                    console.log('🔄 State change:', event);
                }
            });

            window.addEventListener('resize', () => r.resizeDrawingSurfaceToCanvas());
            window.r = r;
        }
    </script>
</body>
</html>
