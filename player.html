<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Rive Player v7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <script src="https://unpkg.com/@rive-app/webgl2@2.21.6"></script>
    <script>
        console.log('🚀 Rive Player v7 (WebGL2)');
        
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboardName = params.get('artboard') || '';
        const stateMachineName = params.get('stateMachine') || params.get('sm') || 'State Machine 1';
        const fitParam = params.get('fit') || 'contain';
        const alignParam = params.get('align') || 'center';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        // Map fit modes to Rive Fit enum
        function getFit(fitName) {
            const fits = {
                'contain': rive.Fit.Contain,
                'cover': rive.Fit.Cover,
                'fill': rive.Fit.Fill,
                'fitwidth': rive.Fit.FitWidth,
                'fitheight': rive.Fit.FitHeight,
                'none': rive.Fit.None,
                'scaledown': rive.Fit.ScaleDown
            };
            return fits[fitName.toLowerCase()] || rive.Fit.Contain;
        }

        // Map alignment to Rive Alignment enum
        function getAlignment(alignName) {
            const aligns = {
                'center': rive.Alignment.Center,
                'topleft': rive.Alignment.TopLeft,
                'topcenter': rive.Alignment.TopCenter,
                'topright': rive.Alignment.TopRight,
                'centerleft': rive.Alignment.CenterLeft,
                'centerright': rive.Alignment.CenterRight,
                'bottomleft': rive.Alignment.BottomLeft,
                'bottomcenter': rive.Alignment.BottomCenter,
                'bottomright': rive.Alignment.BottomRight
            };
            return aligns[alignName.toLowerCase()] || rive.Alignment.Center;
        }

        async function main() {
            if (!src) {
                showError('No src parameter provided');
                return;
            }
            
            if (typeof rive === 'undefined') {
                showError('Failed to load Rive runtime');
                return;
            }

            try {
                const selectedFit = getFit(fitParam);
                const selectedAlign = getAlignment(alignParam);
                
                console.log('📐 Fit:', fitParam, '| Align:', alignParam);

                const riveConfig = {
                    src: src,
                    canvas: canvas,
                    autoplay: true,
                    stateMachines: stateMachineName,
                    automaticallyHandleEvents: true,
                    enableRiveAssetCDN: true,
                    fit: selectedFit,
                    alignment: selectedAlign,
                    onLoad: () => {
                        console.log('✅ Loaded');
                        r.resizeDrawingSurfaceToCanvas();
                    },
                    onLoadError: (e) => {
                        console.error('❌ Load error:', e);
                        showError('Failed to load: ' + (e.message || e));
                    }
                };

                // Add artboard if specified
                if (artboardName) {
                    riveConfig.artboard = artboardName;
                }

                const r = new rive.Rive(riveConfig);

                // Handle resize
                window.addEventListener('resize', () => {
                    r.resizeDrawingSurfaceToCanvas();
                });
                
            } catch (e) {
                console.error('❌ Error:', e);
                showError('Error: ' + e.message);
            }
        }

        main();
    </script>
</body>
</html>
