<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboard = params.get('artboard');
        const stateMachine = params.get('stateMachine') || params.get('sm');
        const fit = params.get('fit') || 'contain';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        if (!src) {
            showError('No src parameter provided');
        } else if (typeof rive === 'undefined') {
            showError('Failed to load Rive runtime');
        } else {
            const fitMap = {
                'contain': rive.Fit.Contain,
                'cover': rive.Fit.Cover,
                'fill': rive.Fit.Fill,
                'fitWidth': rive.Fit.FitWidth,
                'fitHeight': rive.Fit.FitHeight,
                'none': rive.Fit.None,
                'scaleDown': rive.Fit.ScaleDown
            };

            const config = {
                src: src,
                canvas: canvas,
                autoplay: true,
                fit: fitMap[fit] || rive.Fit.Contain,
                shouldDisableRiveListeners: false,
                isTouchScrollEnabled: false,
                onLoad: function() {
                    console.log('✅ Rive loaded');
                    r.resizeDrawingSurfaceToCanvas();
                    
                    // Start manual render loop to keep scripting alive
                    startRenderLoop();
                },
                onLoadError: function(e) {
                    showError('Failed to load: ' + src);
                    console.error('Load error:', e);
                }
            };

            if (artboard && artboard.length > 0) {
                config.artboard = artboard;
            }
            
            if (stateMachine && stateMachine.length > 0) {
                config.stateMachines = stateMachine;
            }

            const r = new rive.Rive(config);

            // Manual render loop to keep scripting running
            let lastTime = 0;
            function renderLoop(time) {
                if (!lastTime) lastTime = time;
                const delta = (time - lastTime) / 1000;
                lastTime = time;
                
                if (r && r.renderer) {
                    r.advance(delta);
                    r.draw();
                }
                
                requestAnimationFrame(renderLoop);
            }
            
            function startRenderLoop() {
                // Stop the default animation loop
                r.stop();
                // Start our own continuous loop
                requestAnimationFrame(renderLoop);
                console.log('🔄 Manual render loop started');
            }

            // Pointer events
            function getCoords(event) {
                const rect = canvas.getBoundingClientRect();
                return { x: event.clientX - rect.left, y: event.clientY - rect.top };
            }

            canvas.addEventListener('mousedown', (e) => {
                const c = getCoords(e);
                r.pointerDown(c.x, c.y);
            });

            canvas.addEventListener('mouseup', (e) => {
                const c = getCoords(e);
                r.pointerUp(c.x, c.y);
            });

            canvas.addEventListener('mousemove', (e) => {
                const c = getCoords(e);
                r.pointerMove(c.x, c.y);
            });

            // Touch
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const c = getCoords(e.touches[0]);
                r.pointerDown(c.x, c.y);
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const c = getCoords(e.changedTouches[0]);
                r.pointerUp(c.x, c.y);
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const c = getCoords(e.touches[0]);
                r.pointerMove(c.x, c.y);
            }, { passive: false });

            // Resize
            window.addEventListener('resize', () => r.resizeDrawingSurfaceToCanvas());

            // Debug
            window.r = r;
        }
    </script>
</body>
</html>
