<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Rive Player v6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <script src="https://unpkg.com/@rive-app/webgl2-advanced@latest"></script>
    <script>
        console.log('🚀 Rive Player v6');
        
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboardName = params.get('artboard');
        const stateMachineName = params.get('stateMachine') || params.get('sm') || 'State Machine 1';
        const fitParam = params.get('fit') || 'contain';
        const alignParam = params.get('align') || 'center';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        async function main() {
            if (!src) {
                showError('No src parameter provided');
                return;
            }
            
            if (typeof rive === 'undefined') {
                showError('Failed to load Rive runtime');
                return;
            }

            try {
                await rive.default({
                    locateFile: (file) => `https://unpkg.com/@rive-app/webgl2-advanced@latest/${file}`
                });
                
                // Map fit modes
                const fitMap = {
                    'contain': rive.Fit.contain,
                    'cover': rive.Fit.cover,
                    'fill': rive.Fit.fill,
                    'fitWidth': rive.Fit.fitWidth,
                    'fitHeight': rive.Fit.fitHeight,
                    'none': rive.Fit.none,
                    'scaleDown': rive.Fit.scaleDown
                };
                
                // Map alignments
                const alignMap = {
                    'center': rive.Alignment.center,
                    'topLeft': rive.Alignment.topLeft,
                    'topCenter': rive.Alignment.topCenter,
                    'topRight': rive.Alignment.topRight,
                    'centerLeft': rive.Alignment.centerLeft,
                    'centerRight': rive.Alignment.centerRight,
                    'bottomLeft': rive.Alignment.bottomLeft,
                    'bottomCenter': rive.Alignment.bottomCenter,
                    'bottomRight': rive.Alignment.bottomRight
                };
                
                const selectedFit = fitMap[fitParam] || rive.Fit.contain;
                const selectedAlign = alignMap[alignParam] || rive.Alignment.center;
                
                console.log('📐 Fit:', fitParam, '| Align:', alignParam);
                
                const renderer = rive.makeRenderer(canvas, true);
                const bytes = await (await fetch(src)).arrayBuffer();
                const file = await rive.load(new Uint8Array(bytes));
                
                // Get artboard
                let artboardInstance;
                if (artboardName) {
                    artboardInstance = file.artboardByName(artboardName);
                }
                if (!artboardInstance) {
                    artboardInstance = file.defaultArtboard();
                }
                
                // Get state machine
                let stateMachine;
                if (stateMachineName) {
                    stateMachine = artboardInstance.stateMachineByName(stateMachineName);
                }
                if (!stateMachine) {
                    stateMachine = artboardInstance.stateMachineByIndex(0);
                }
                
                if (!stateMachine) {
                    showError('No state machine found');
                    return;
                }

                console.log('✅ Loaded');
                console.log('🎨 Artboard:', artboardInstance.name);
                console.log('⚙️ State machine:', stateMachineName);

                let lastTime = 0;
                
                function renderLoop(time) {
                    if (!lastTime) lastTime = time;
                    const elapsedMs = time - lastTime;
                    lastTime = time;
                    
                    renderer.clear();
                    stateMachine.advance(elapsedMs / 1000);
                    artboardInstance.advance(elapsedMs / 1000);
                    
                    renderer.save();
                    renderer.align(
                        selectedFit,
                        selectedAlign,
                        {
                            minX: 0,
                            minY: 0,
                            maxX: canvas.width,
                            maxY: canvas.height
                        },
                        artboardInstance.bounds
                    );
                    artboardInstance.draw(renderer);
                    renderer.restore();
                    renderer.flush();
                    
                    requestAnimationFrame(renderLoop);
                }

                // Pointer events
                canvas.addEventListener('pointerdown', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    stateMachine.pointerDown(e.clientX - rect.left, e.clientY - rect.top);
                });

                canvas.addEventListener('pointerup', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    stateMachine.pointerUp(e.clientX - rect.left, e.clientY - rect.top);
                });

                canvas.addEventListener('pointermove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    stateMachine.pointerMove(e.clientX - rect.left, e.clientY - rect.top);
                });

                // Resize
                function resize() {
                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = canvas.clientWidth * dpr;
                    canvas.height = canvas.clientHeight * dpr;
                }
                resize();
                window.addEventListener('resize', resize);

                requestAnimationFrame(renderLoop);
                
            } catch (e) {
                console.error('❌ Error:', e);
                showError('Error: ' + e.message);
            }
        }

        main();
    </script>
</body>
</html>
