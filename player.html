<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Rive Player v12</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
        .loading {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas" style="display: none;"></canvas>
    <div id="loading" class="loading">Loading...</div>
    <div id="error" class="error" style="display: none;"></div>
    
    <!-- Use UMD build -->
    <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
    <script>
        console.log('🚀 Rive Player v12');
        
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboardName = params.get('artboard') || '';
        const stateMachineName = params.get('stateMachine') || params.get('sm') || 'State Machine 1';
        const fitParam = params.get('fit') || 'contain';
        const alignParam = params.get('align') || 'center';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');

        function showError(msg) {
            loadingDiv.style.display = 'none';
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
            console.error('❌', msg);
        }

        function showCanvas() {
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            canvas.style.display = 'block';
        }

        async function main() {
            if (!src) {
                showError('No src parameter provided');
                return;
            }
            
            if (typeof rive === 'undefined') {
                showError('Failed to load Rive runtime');
                return;
            }

            try {
                // Fit mapping
                const fitMap = {
                    'contain': rive.Fit.Contain,
                    'cover': rive.Fit.Cover,
                    'fill': rive.Fit.Fill,
                    'fitwidth': rive.Fit.FitWidth,
                    'fitheight': rive.Fit.FitHeight,
                    'none': rive.Fit.None,
                    'scaledown': rive.Fit.ScaleDown
                };
                
                // Alignment mapping
                const alignMap = {
                    'center': rive.Alignment.Center,
                    'topleft': rive.Alignment.TopLeft,
                    'topcenter': rive.Alignment.TopCenter,
                    'topright': rive.Alignment.TopRight,
                    'centerleft': rive.Alignment.CenterLeft,
                    'centerright': rive.Alignment.CenterRight,
                    'bottomleft': rive.Alignment.BottomLeft,
                    'bottomcenter': rive.Alignment.BottomCenter,
                    'bottomright': rive.Alignment.BottomRight
                };
                
                const selectedFit = fitMap[fitParam.toLowerCase()] || rive.Fit.Contain;
                const selectedAlign = alignMap[alignParam.toLowerCase()] || rive.Alignment.Center;
                
                console.log('📐 Fit:', fitParam, '| Align:', alignParam);
                
                // Create layout
                const layout = new rive.Layout({
                    fit: selectedFit,
                    alignment: selectedAlign
                });

                // Config
                const config = {
                    src: src,
                    canvas: canvas,
                    layout: layout,
                    autoplay: true,
                    stateMachines: stateMachineName,
                    automaticallyHandleEvents: true,
                    enableRiveAssetCDN: true,
                    onLoad: () => {
                        console.log('✅ Loaded');
                        showCanvas();
                        r.resizeDrawingSurfaceToCanvas();
                    },
                    onLoadError: (e) => {
                        showError('Failed to load: ' + (e.message || e));
                    }
                };
                
                // Add artboard if specified
                if (artboardName) {
                    config.artboard = artboardName;
                }

                const r = new rive.Rive(config);

                // Handle resize
                window.addEventListener('resize', () => {
                    r.resizeDrawingSurfaceToCanvas();
                });
                
            } catch (e) {
                console.error('❌ Error:', e);
                showError('Error: ' + e.message);
            }
        }

        main();
    </script>
</body>
</html>
