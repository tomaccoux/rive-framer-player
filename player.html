<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Rive Player v5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <!-- Use Rive Renderer (pls) for full feature support -->
    <script src="https://unpkg.com/@rive-app/webgl2-advanced@latest"></script>
    <script>
        console.log('🚀 Rive Player v5 (Advanced WebGL2)');
        
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboard = params.get('artboard');
        const stateMachineName = params.get('stateMachine') || params.get('sm') || 'State Machine 1';
        const fit = params.get('fit') || 'contain';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        async function main() {
            if (!src) {
                showError('No src parameter provided');
                return;
            }
            
            if (typeof rive === 'undefined') {
                showError('Failed to load Rive runtime');
                return;
            }

            try {
                // Initialize Rive with the advanced renderer
                await rive.default({
                    locateFile: (file) => `https://unpkg.com/@rive-app/webgl2-advanced@latest/${file}`
                });
                
                const renderer = rive.makeRenderer(canvas, true);
                const bytes = await (await fetch(src)).arrayBuffer();
                const file = await rive.load(new Uint8Array(bytes));
                
                const artboardInstance = file.defaultArtboard();
                const stateMachine = artboardInstance.stateMachineByName(stateMachineName) || 
                                    artboardInstance.stateMachineByIndex(0);
                
                if (!stateMachine) {
                    showError('No state machine found');
                    return;
                }

                console.log('✅ Loaded with advanced renderer');
                console.log('🎨 Artboard:', artboardInstance.name);
                console.log('⚙️ State machine:', stateMachineName);

                let lastTime = 0;
                
                function renderLoop(time) {
                    if (!lastTime) lastTime = time;
                    const elapsedMs = time - lastTime;
                    lastTime = time;
                    
                    renderer.clear();
                    stateMachine.advance(elapsedMs / 1000);
                    artboardInstance.advance(elapsedMs / 1000);
                    
                    renderer.save();
                    renderer.align(
                        rive.Fit.contain,
                        rive.Alignment.center,
                        {
                            minX: 0,
                            minY: 0,
                            maxX: canvas.width,
                            maxY: canvas.height
                        },
                        artboardInstance.bounds
                    );
                    artboardInstance.draw(renderer);
                    renderer.restore();
                    renderer.flush();
                    
                    requestAnimationFrame(renderLoop);
                }

                // Handle pointer events
                canvas.addEventListener('pointerdown', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    stateMachine.pointerDown(x, y);
                    console.log('👆 Click:', x, y);
                });

                canvas.addEventListener('pointerup', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    stateMachine.pointerUp(e.clientX - rect.left, e.clientY - rect.top);
                });

                canvas.addEventListener('pointermove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    stateMachine.pointerMove(e.clientX - rect.left, e.clientY - rect.top);
                });

                // Handle resize
                function resize() {
                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = canvas.clientWidth * dpr;
                    canvas.height = canvas.clientHeight * dpr;
                }
                resize();
                window.addEventListener('resize', resize);

                requestAnimationFrame(renderLoop);
                
            } catch (e) {
                console.error('❌ Error:', e);
                showError('Error: ' + e.message);
            }
        }

        main();
    </script>
</body>
</html>
