<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        .error { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, sans-serif;
            color: #c00;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="rive-canvas"></canvas>
    <div id="error" class="error" style="display: none;"></div>
    
    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const artboard = params.get('artboard');
        const stateMachine = params.get('stateMachine') || params.get('sm');
        const fit = params.get('fit') || 'contain';
        
        const canvas = document.getElementById('rive-canvas');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorDiv.textContent = msg;
        }

        if (!src) {
            showError('No src parameter provided');
        } else if (typeof rive === 'undefined') {
            showError('Failed to load Rive runtime');
        } else {
            const fitMap = {
                'contain': rive.Fit.Contain,
                'cover': rive.Fit.Cover,
                'fill': rive.Fit.Fill,
                'fitWidth': rive.Fit.FitWidth,
                'fitHeight': rive.Fit.FitHeight,
                'none': rive.Fit.None,
                'scaleDown': rive.Fit.ScaleDown
            };

            let riveInstance = null;
            let stateMachineInputs = null;

            const config = {
                src: src,
                canvas: canvas,
                autoplay: true,
                fit: fitMap[fit] || rive.Fit.Contain,
                enableRiveAssetCDN: true,
                onLoad: function() {
                    riveInstance.resizeDrawingSurfaceToCanvas();
                    
                    // Get state machine inputs for interaction
                    const inputs = riveInstance.stateMachineInputs(
                        stateMachine || riveInstance.stateMachineNames[0]
                    );
                    stateMachineInputs = inputs;
                    
                    console.log('✅ Rive loaded');
                    console.log('Artboards:', riveInstance.artboardNames);
                    console.log('State Machines:', riveInstance.stateMachineNames);
                    console.log('Inputs:', inputs?.map(i => i.name));
                },
                onLoadError: function(e) {
                    showError('Failed to load: ' + src);
                    console.error('Load error:', e);
                }
            };

            if (artboard && artboard.length > 0) {
                config.artboard = artboard;
            }
            
            // Use specified state machine or let Rive pick the first one
            if (stateMachine && stateMachine.length > 0) {
                config.stateMachines = stateMachine;
            } else {
                // Auto-detect: will use first state machine
                config.automaticallyHandleEvents = true;
            }

            riveInstance = new rive.Rive(config);

            // Handle pointer events for interactivity
            function getCanvasCoordinates(event) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: event.clientX - rect.left,
                    y: event.clientY - rect.top
                };
            }

            canvas.addEventListener('mousemove', (e) => {
                if (!riveInstance) return;
                const coords = getCanvasCoordinates(e);
                riveInstance.pointerMove(coords.x, coords.y);
            });

            canvas.addEventListener('mousedown', (e) => {
                if (!riveInstance) return;
                const coords = getCanvasCoordinates(e);
                riveInstance.pointerDown(coords.x, coords.y);
            });

            canvas.addEventListener('mouseup', (e) => {
                if (!riveInstance) return;
                const coords = getCanvasCoordinates(e);
                riveInstance.pointerUp(coords.x, coords.y);
            });

            // Touch events for mobile
            canvas.addEventListener('touchstart', (e) => {
                if (!riveInstance) return;
                e.preventDefault();
                const touch = e.touches[0];
                const coords = getCanvasCoordinates(touch);
                riveInstance.pointerDown(coords.x, coords.y);
            });

            canvas.addEventListener('touchend', (e) => {
                if (!riveInstance) return;
                e.preventDefault();
                const touch = e.changedTouches[0];
                const coords = getCanvasCoordinates(touch);
                riveInstance.pointerUp(coords.x, coords.y);
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!riveInstance) return;
                e.preventDefault();
                const touch = e.touches[0];
                const coords = getCanvasCoordinates(touch);
                riveInstance.pointerMove(coords.x, coords.y);
            });

            // Handle resize
            window.addEventListener('resize', function() {
                if (riveInstance) {
                    riveInstance.resizeDrawingSurfaceToCanvas();
                }
            });

            window.riveInstance = riveInstance;
        }
    </script>
</body>
</html>
